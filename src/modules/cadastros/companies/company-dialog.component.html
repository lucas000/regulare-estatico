<h2 mat-dialog-title>Empresa</h2>
<mat-dialog-content [formGroup]="form">
  <mat-form-field appearance="fill" style="width:100%">
    <mat-label>Nome</mat-label>
    <input matInput formControlName="nome" />
  </mat-form-field>

  <mat-form-field appearance="fill" style="width:100%">
    <mat-label>CNPJ</mat-label>
    <input matInput formControlName="cnpj" />
  </mat-form-field>

  <mat-form-field appearance="fill" style="width:100%">
    <mat-label>Email (obrigatório)</mat-label>
    <input matInput formControlName="email" type="email" />
    <mat-error *ngIf="form.controls['email']?.invalid">Email é obrigatório</mat-error>
  </mat-form-field>

  <mat-form-field appearance="fill" style="width:100%">
    <mat-label>Senha (opcional)</mat-label>
    <input matInput formControlName="password" type="password" />
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancelar</button>
  <button mat-flat-button color="primary" (click)="save()">Salvar</button>
</mat-dialog-actions>
