<div class="cadastros-full">
  <div class="toolbar-row" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
    <div style="flex:1;display:flex;align-items:center;">
      <mat-form-field appearance="outline" style="width:100%;max-width:480px;">
        <input matInput placeholder="Buscar por nome" [formControl]="searchControl" (keyup.enter)="search()" />
      </mat-form-field>
    </div>
    <div>
      <button mat-flat-button color="primary" (click)="newUnit()">Nova Unidade</button>
    </div>
  </div>

  <mat-progress-bar *ngIf="loading" mode="indeterminate"></mat-progress-bar>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z1" style="width:100%">
    <!-- Nome -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Nome da Unidade </th>
      <td mat-cell *matCellDef="let element"> {{element.name}} </td>
    </ng-container>

    <!-- Documento -->
    <ng-container matColumnDef="document">
      <th mat-header-cell *matHeaderCellDef> Documento </th>
      <td mat-cell *matCellDef="let element"> {{ formatDocument(element) }} </td>
    </ng-container>

    <!-- CNAE Principal -->
    <ng-container matColumnDef="cnaeMain">
      <th mat-header-cell *matHeaderCellDef> CNAE Principal </th>
      <td mat-cell *matCellDef="let element"> {{ cnaeDisplay(element.cnaeMain) }} </td>
    </ng-container>

    <!-- Cidade / UF -->
    <ng-container matColumnDef="cityUf">
      <th mat-header-cell *matHeaderCellDef> Cidade / UF </th>
      <td mat-cell *matCellDef="let element"> {{ getCityUf(element) }} </td>
    </ng-container>

    <!-- Status -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Status </th>
      <td mat-cell *matCellDef="let element">
        <div class="status-cell">
          <span [ngClass]="{'status-badge': true, 'status-ativo': element.status==='active', 'status-inativo': element.status!=='active'}">{{element.status==='active' ? 'Ativa' : 'Inativa'}}</span>
        </div>
      </td>
    </ng-container>

    <!-- Ações -->
    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef> Ações </th>
      <td mat-cell *matCellDef="let element">
        <div class="actions-container">
          <button mat-icon-button (click)="toggleActive(element)" matTooltip="Ativar/Inativar">
            <mat-icon>{{element.status==='active'?'toggle_on':'toggle_off'}}</mat-icon>
          </button>
          <button mat-icon-button (click)="editUnit(element)" matTooltip="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button (click)="duplicateUnit(element)" matTooltip="Duplicar">
            <mat-icon>content_copy</mat-icon>
          </button>
        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let element; columns: columns;"></tr>
  </table>
    <br>
  <mat-paginator [pageSize]="pageSize" [pageSizeOptions]="[30]" [length]="total" (page)="onPage($event)"></mat-paginator>
</div>
