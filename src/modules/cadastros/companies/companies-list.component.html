<div class="cadastros-full">
  <div class="toolbar">
    <button mat-flat-button color="primary" (click)="newCompany()">Nova Empresa</button>
  </div>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8" style="width:100%">
    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef>Nome</th>
      <td mat-cell *matCellDef="let c">{{ c.nome }}</td>
    </ng-container>

    <ng-container matColumnDef="cnpj">
      <th mat-header-cell *matHeaderCellDef>CNPJ</th>
      <td mat-cell *matCellDef="let c">{{ c.cnpj }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let c">{{ c.status }}</td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef>Ações</th>
      <td mat-cell *matCellDef="let c">
        <button mat-icon-button (click)="editCompany(c)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button (click)="toggleActive(c)">
          <mat-icon>{{ c.status === 'ativo' ? 'toggle_on' : 'toggle_off' }}</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns"></tr>
  </table>
</div>
