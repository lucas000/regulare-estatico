<div class="cadastros-full">
  <div class="toolbar-row" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
    <div style="flex:1;display:flex;align-items:center;">
      <mat-form-field appearance="outline" style="width:100%;max-width:480px;">
        <input matInput placeholder="Buscar por nome" [formControl]="searchControl" />
      </mat-form-field>
    </div>
    <div>
      <button mat-flat-button color="primary" (click)="newRisk()">Novo Risco</button>
    </div>
  </div>

  <mat-progress-bar *ngIf="loading" mode="indeterminate"></mat-progress-bar>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z1" style="width:100%">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Nome do Risco </th>
      <td mat-cell *matCellDef="let element"> {{ element.name }} </td>
    </ng-container>

    <ng-container matColumnDef="riskGroup">
      <th mat-header-cell *matHeaderCellDef> Grupo de Risco </th>
      <td mat-cell *matCellDef="let element"> {{ groupLabel(element.riskGroup) }} </td>
    </ng-container>

    <ng-container matColumnDef="evaluationType">
      <th mat-header-cell *matHeaderCellDef> Tipo de Avaliação </th>
      <td mat-cell *matCellDef="let element"> {{ evaluationLabel(element.riskType) }} </td>
    </ng-container>

    <ng-container matColumnDef="esocialCode">
      <th mat-header-cell *matHeaderCellDef> Código eSocial </th>
      <td mat-cell *matCellDef="let element"> {{ element.esocialCode }} </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Situação </th>
      <td mat-cell *matCellDef="let element">
        <div class="status-cell">
          <span [ngClass]="{'status-badge': true, 'status-ativo': element.status==='ativo', 'status-inativo': element.status!=='ativo'}">
            {{ element.status==='ativo' ? 'Ativo' : 'Inativo' }}
          </span>
        </div>
      </td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef> Ações </th>
      <td mat-cell *matCellDef="let element">
        <button mat-icon-button (click)="editRisk(element)"><mat-icon>edit</mat-icon></button>
        <button mat-icon-button (click)="toggleActive(element)"><mat-icon>{{element.status==='ativo'?'toggle_on':'toggle_off'}}</mat-icon></button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns"></tr>
  </table>

  <br />
  <mat-paginator [pageSize]="pageSize" [pageSizeOptions]="[30]" [length]="total" (page)="onPage($event)"></mat-paginator>
</div>
