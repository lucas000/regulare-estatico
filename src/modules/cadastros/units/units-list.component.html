<div class="cadastros-full">
  <div class="toolbar">
    <button mat-flat-button color="primary" (click)="newUnit()">Nova Unidade</button>
  </div>

  <table mat-table [dataSource]="units" class="mat-elevation-z8" style="width:100%">
    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef>Nome</th>
      <td mat-cell *matCellDef="let u">{{ u.nome }}</td>
    </ng-container>

    <ng-container matColumnDef="cidade">
      <th mat-header-cell *matHeaderCellDef>Cidade</th>
      <td mat-cell *matCellDef="let u">{{ u.cidade }}</td>
    </ng-container>

    <ng-container matColumnDef="estado">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let u">{{ u.estado }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let u">{{ u.status }}</td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef>Ações</th>
      <td mat-cell *matCellDef="let u">
        <button mat-icon-button (click)="editUnit(u)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button (click)="toggleActive(u)">
          <mat-icon>{{ u.status === 'ativo' ? 'toggle_on' : 'toggle_off' }}</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns"></tr>
  </table>
</div>
