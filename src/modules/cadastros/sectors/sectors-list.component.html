<div class="cadastros-full">
  <div class="toolbar-row" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
    <div style="flex:1;display:flex;align-items:center;">
      <mat-form-field appearance="outline" style="width:100%;max-width:480px;">
        <input matInput placeholder="Buscar por nome do setor" [formControl]="searchControl" (keyup.enter)="search()" />
      </mat-form-field>
    </div>
    <div>
      <button mat-flat-button color="primary" (click)="newSector()">Novo Setor</button>
    </div>
  </div>

  <mat-progress-bar *ngIf="loading" mode="indeterminate"></mat-progress-bar>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8" style="width:100%">
    <!-- Nome do Setor -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Nome do Setor </th>
      <td mat-cell *matCellDef="let element"> {{element.name}} </td>
    </ng-container>

    <!-- Unidade -->
    <ng-container matColumnDef="unit">
      <th mat-header-cell *matHeaderCellDef> Unidade </th>
      <td mat-cell *matCellDef="let element"> {{ getUnitName(element.unitId) }} </td>
    </ng-container>

    <!-- Nº de Trabalhadores -->
    <ng-container matColumnDef="estimatedWorkers">
      <th mat-header-cell *matHeaderCellDef> Nº de Trabalhadores </th>
      <td mat-cell *matCellDef="let element"> {{element.estimatedWorkers}} </td>
    </ng-container>

    <!-- Status -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Situação </th>
      <td mat-cell *matCellDef="let element">
        <div class="status-cell">
          <span [ngClass]="{'status-badge': true, 'status-ativo': element.status==='active', 'status-inativo': element.status!=='active'}">{{element.status==='active' ? 'Ativo' : 'Inativo'}}</span>
        </div>
      </td>
    </ng-container>

    <!-- Ações -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Ações </th>
      <td mat-cell *matCellDef="let element">
          <button mat-icon-button (click)="toggleActive(element)"><mat-icon>{{element.status==='active'?'toggle_on':'toggle_off'}}</mat-icon></button>
          <button mat-icon-button (click)="editSector(element)"><mat-icon>edit</mat-icon></button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let element; columns: columns;"></tr>
  </table>
    <br>
  <mat-paginator [pageSize]="pageSize" [pageSizeOptions]="[30]" [length]="total" (page)="onPage($event)"></mat-paginator>
</div>
