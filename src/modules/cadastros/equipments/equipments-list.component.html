<div class="cadastros-full">
    <div class="toolbar-row">
        <div class="filters">
            <mat-form-field appearance="outline" class="filter-text">
                <input matInput placeholder="Buscar por nome" [formControl]="searchControl"/>
            </mat-form-field>

            <mat-form-field appearance="outline" class="filter-type">
                <mat-select placeholder="Tipo" [formControl]="typeControl">
                    <mat-option value="">Todos</mat-option>
                    <mat-option value="EPI">EPI</mat-option>
                    <mat-option value="EPC">EPC</mat-option>
                </mat-select>
            </mat-form-field>
        </div>

        <div class="actions" *ngIf="!isCliente && !hasAdminScope">
            <button mat-flat-button color="primary" (click)="newEquipment()">Novo Equipamento</button>
        </div>
    </div>

    <mat-progress-bar *ngIf="loading" mode="indeterminate"></mat-progress-bar>

    <table mat-table [dataSource]="dataSource" class="mat-elevation-z1" style="width:100%">
        <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef> Nome do Equipamento</th>
            <td mat-cell *matCellDef="let element"> {{ element.name }}</td>
        </ng-container>

        <ng-container matColumnDef="type">
            <th mat-header-cell *matHeaderCellDef> Tipo</th>
            <td mat-cell *matCellDef="let element"> {{ element.type }}</td>
        </ng-container>

        <ng-container matColumnDef="hasCertification">
            <th mat-header-cell *matHeaderCellDef> Possui CA / Norma</th>
            <td mat-cell *matCellDef="let element"> {{ hasCertLabel(element.hasCertification) }}</td>
        </ng-container>

        <ng-container matColumnDef="certificationNumber">
            <th mat-header-cell *matHeaderCellDef> CA</th>
            <td mat-cell *matCellDef="let element"> {{ element.certificationNumber }}</td>
        </ng-container>

        <ng-container matColumnDef="validUntil">
            <th mat-header-cell *matHeaderCellDef> Validade</th>
            <td mat-cell *matCellDef="let element"> {{ element.validUntil }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef> Situação</th>
            <td mat-cell *matCellDef="let element">
        <span [ngClass]="{'status-badge': true, 'status-ativo': element.status==='ativo', 'status-inativo': element.status!=='ativo'}">
          {{ element.status === 'ativo' ? 'Ativo' : 'Inativo' }}
        </span>
            </td>
        </ng-container>

        <ng-container matColumnDef="acoes">
            <th mat-header-cell *matHeaderCellDef> Ações</th>
            <td mat-cell *matCellDef="let element">
                <button mat-icon-button (click)="editEquipment(element)">
                    <mat-icon>edit</mat-icon>
                </button>
                <button mat-icon-button (click)="toggleActive(element)">
                    <mat-icon>{{ element.status === 'ativo' ? 'toggle_on' : 'toggle_off' }}</mat-icon>
                </button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="columns"></tr>
        <tr mat-row *matRowDef="let row; columns: columns"></tr>
    </table>

    <br/>
    <mat-paginator [pageSize]="pageSize" [pageSizeOptions]="[30]" [length]="total"
                   (page)="onPage($event)"></mat-paginator>
</div>
