<div class="cadastros-full">
  <div class="toolbar-row" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
    <div style="flex:1;display:flex;align-items:center;">
      <mat-form-field appearance="outline" style="width:100%;max-width:480px;">
        <input matInput placeholder="Buscar por nome" [formControl]="searchControl" (keyup.enter)="search()" />
      </mat-form-field>
<!--      <button mat-button (click)="search()" style="margin-left:8px">Buscar</button>-->
<!--      &lt;!&ndash; Dev-only generator button &ndash;&gt;-->
<!--      <button mat-stroked-button color="accent" style="margin-left:8px" (click)="generateTestData()" [disabled]="generatingTestData">Gerar Empresas (Teste)</button>-->
    </div>
    <div>
      <button mat-flat-button color="primary" (click)="newCompany()">Nova Empresa</button>
    </div>
  </div>

  <mat-progress-bar *ngIf="loading" mode="indeterminate"></mat-progress-bar>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8" style="width:100%">
    <!-- Name Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Nome </th>
      <td mat-cell *matCellDef="let element"> {{element.name}} </td>
    </ng-container>

    <!-- CNPJ Column -->
    <ng-container matColumnDef="cnpj">
      <th mat-header-cell *matHeaderCellDef> CNPJ </th>
      <td mat-cell *matCellDef="let element"> {{element.cnpj}} </td>
    </ng-container>

    <!-- Status Column -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Status </th>
      <td mat-cell *matCellDef="let element">
        <div class="status-cell">
          <span [ngClass]="{'status-badge': true, 'status-ativo': element.status==='ativo', 'status-inativo': element.status!=='ativo'}">{{element.status==='ativo' ? 'Ativa' : 'Inativa'}}</span>
        </div>
      </td>
    </ng-container>

    <!-- Actions Column -->
    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef> Ações </th>
      <td mat-cell *matCellDef="let element">
          <button mat-icon-button (click)="toggleActive(element)"><mat-icon>{{element.status==='ativo'?'toggle_on':'toggle_off'}}</mat-icon></button>
          <button mat-icon-button (click)="editCompany(element)"><mat-icon>edit</mat-icon></button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let element; columns: columns;"></tr>
  </table>
    <br>
  <mat-paginator [pageSize]="pageSize" [pageSizeOptions]="[30]" [length]="total" (page)="onPage($event)"></mat-paginator>
</div>
